name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        # `npm install`, not `npm ci`: the committed lockfile is generated on
        # Windows and only records the win32 rollup native binary in its
        # installed tree. `npm ci` reproduces that tree verbatim and never
        # installs @rollup/rollup-linux-x64-gnu on the Linux runner, so tsup's
        # rollup-based .d.ts build crashes (npm/cli#4828). `npm install` lets
        # the runner resolve its own platform's optional binary.
        run: npm install

      - name: Build engine
        run: npm -w srl-engine run build

      - name: Build playground
        run: npm -w playground run build
        env:
          NEXT_PUBLIC_BASE_PATH: /shacl-rules

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/playground/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
